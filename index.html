<title>私に合うケアを診断 | Dione自由が丘</title>
<style>
  :root {
    --paper: #fff7f8;
    --paper-raised: #ffffff;
    --ink: #4a3f3f;
    --ink-soft: #7a6a6a;
    --pink: #f6c9d2;
    --pink-light: #fbe3e8;
    --pink-strong: #db8298;
    --beige: #e8d8c8;
    --beige-deep: #a98a6e;
    --on-accent: #ffffff;
    --line: #f3e4e7;
    --shadow: 0 14px 30px -18px rgba(74, 63, 63, 0.18);

    --t-camel: var(--beige-deep);
    --t-camel-soft: #f1e6da;
    --t-chick: var(--pink-strong);
    --t-chick-soft: var(--pink-light);
    --t-hedgehog: #c17b6e;
    --t-hedgehog-soft: #f2ddd6;
    --t-cat: #96878a;
    --t-cat-soft: #eae2e1;
  }

  :root[data-theme="dark"] {
    --paper: #241d1e;
    --paper-raised: #2d2526;
    --ink: #f3e9e7;
    --ink-soft: #c7b7b5;
    --pink: #4a3238;
    --pink-light: #3c2b2e;
    --pink-strong: #e39cae;
    --beige: #3a322b;
    --beige-deep: #c9aa88;
    --on-accent: #2e2325;
    --line: #3e3234;
    --shadow: 0 16px 34px -16px rgba(0, 0, 0, 0.5);

    --t-camel: var(--beige-deep);
    --t-camel-soft: #3a2e22;
    --t-chick: var(--pink-strong);
    --t-chick-soft: var(--pink-light);
    --t-hedgehog: #cc9184;
    --t-hedgehog-soft: #3b2a26;
    --t-cat: #b4a5a3;
    --t-cat-soft: #332c2c;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --paper: #241d1e;
      --paper-raised: #2d2526;
      --ink: #f3e9e7;
      --ink-soft: #c7b7b5;
      --pink: #4a3238;
      --pink-light: #3c2b2e;
      --pink-strong: #e39cae;
      --beige: #3a322b;
      --beige-deep: #c9aa88;
      --on-accent: #2e2325;
      --line: #3e3234;
      --shadow: 0 16px 34px -16px rgba(0, 0, 0, 0.5);

      --t-camel: var(--beige-deep);
      --t-camel-soft: #3a2e22;
      --t-chick: var(--pink-strong);
      --t-chick-soft: var(--pink-light);
      --t-hedgehog: #cc9184;
      --t-hedgehog-soft: #3b2a26;
      --t-cat: #b4a5a3;
      --t-cat-soft: #332c2c;
    }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
  }

  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic Medium", "Yu Gothic",
      "Noto Sans JP", "Meiryo", sans-serif;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .font-display {
    font-family: "Hiragino Mincho ProN", "YuMincho", "Yu Mincho",
      "Noto Serif JP", serif;
  }

  .app {
    width: 100%;
    max-width: 460px;
    min-height: 100vh;
    background: var(--paper-raised);
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow);
  }

  @media (min-width: 640px) {
    body { padding: 32px 16px; }
    .app { min-height: calc(100vh - 64px); border-radius: 22px; }
  }

  .topbar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--line);
  }

  .brand {
    font-size: 0.95rem;
    letter-spacing: 0.14em;
    font-weight: 600;
    color: var(--pink-strong);
  }
  .brand span {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    font-weight: 400;
    margin-left: 6px;
  }

  .qcount {
    font-variant-numeric: tabular-nums;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
  }

  .stage {
    flex: 1;
    padding: 34px 24px 44px;
    display: flex;
    flex-direction: column;
  }

  /* ---- Progress dots ---- */
  .dots {
    display: flex;
    gap: 8px;
    margin-bottom: 30px;
  }
  .dots i {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--line);
    overflow: hidden;
  }
  .dots i.done { background: var(--pink); }
  .dots i.current { background: linear-gradient(90deg, var(--pink) 50%, var(--line) 50%); }

  /* ---- Intro ---- */
  .intro { text-align: center; margin: auto 0; }
  .intro .eyebrow {
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    color: var(--pink-strong);
    font-weight: 600;
  }
  .intro h1 {
    font-size: clamp(1.55rem, 6vw, 1.95rem);
    margin: 12px 0 18px;
    text-wrap: balance;
    font-weight: 600;
  }
  .intro p {
    color: var(--ink-soft);
    font-size: 0.92rem;
    margin: 0 auto 32px;
    max-width: 30em;
  }
  .intro .quad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 34px;
  }
  .intro .quad .thumb {
    aspect-ratio: 16 / 9;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .intro .quad .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ---- Buttons ---- */
  .btn {
    appearance: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.96rem;
    font-weight: 600;
    border-radius: 999px;
    min-height: 54px;
    padding: 16px 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn:focus-visible { outline: 3px solid var(--beige-deep); outline-offset: 2px; }

  .btn-primary {
    background: var(--pink-strong);
    color: var(--on-accent);
    box-shadow: 0 12px 24px -12px rgba(219, 130, 152, 0.55);
    width: 100%;
  }
  .btn-secondary {
    background: transparent;
    color: var(--pink-strong);
    border: 1.5px solid var(--pink-strong);
    width: 100%;
  }
  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    font-weight: 500;
    font-size: 0.85rem;
    min-height: auto;
    padding: 10px 12px;
  }
  .btn-beige {
    background: var(--beige-deep);
    color: var(--on-accent);
    width: 100%;
  }
  .btn[disabled] { opacity: 0.55; pointer-events: none; }

  /* ---- Question ---- */
  .qhead .cat { font-size: 0.75rem; letter-spacing: 0.08em; color: var(--beige-deep); font-weight: 600; }
  .qhead h2 {
    font-size: clamp(1.1rem, 4.6vw, 1.3rem);
    margin: 10px 0 28px;
    text-wrap: balance;
    font-weight: 600;
  }

  .choices { display: flex; flex-direction: column; gap: 14px; }
  .choice {
    text-align: left;
    background: var(--paper-raised);
    border: 1.5px solid var(--line);
    border-radius: 20px;
    padding: 16px 18px;
    cursor: pointer;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    font-family: inherit;
    color: var(--ink);
    box-shadow: var(--shadow);
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }
  .choice:hover { border-color: var(--pink-strong); }
  .choice:active { transform: scale(0.99); }
  .choice:focus-visible { outline: 3px solid var(--beige-deep); outline-offset: 2px; }
  .choice .key {
    flex: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--pink-light);
    border: 1.5px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--pink-strong);
  }
  .choice .body strong { display: block; font-size: 0.94rem; font-weight: 600; }
  .choice .body em {
    display: block;
    font-style: normal;
    font-size: 0.8rem;
    color: var(--ink-soft);
    margin-top: 4px;
  }

  .stepnav { margin-top: 22px; }

  /* ---- Teaser / Result ---- */
  .result-wash {
    margin: -34px -24px 28px;
    padding: 40px 24px 32px;
    background: var(--wash, var(--paper));
    text-align: center;
    border-radius: 0 0 36px 36px;
  }
  .hero-img {
    width: 100%;
    max-width: 300px;
    aspect-ratio: 16 / 9;
    margin: 0 auto 18px;
    border-radius: 20px;
    overflow: hidden;
    background: var(--paper-raised);
    border: 3px solid var(--accent, var(--pink-strong));
    box-shadow: var(--shadow);
  }
  .hero-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .type-eyebrow {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    color: var(--accent, var(--pink-strong));
    font-weight: 700;
  }
  .type-name {
    font-size: clamp(1.3rem, 6vw, 1.6rem);
    margin: 10px 0 6px;
    font-weight: 700;
    text-wrap: balance;
  }
  .type-tagline { color: var(--ink-soft); font-size: 0.85rem; }

  .oneliner {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px 20px;
    font-size: 0.92rem;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }

  .section-label {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    font-weight: 700;
    color: var(--beige-deep);
    margin: 30px 0 12px;
  }
  .section-label.highlight {
    display: inline-block;
    background: linear-gradient(180deg, transparent 60%, #ffd966 60%, #ffd966 92%, transparent 92%);
    padding: 0 3px;
  }
  .prose { font-size: 0.92rem; color: var(--ink); }
  .prose + .prose { margin-top: 10px; }

  .product-card {
    margin-top: 14px;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-left: 4px solid var(--accent, var(--pink-strong));
    border-radius: 6px 20px 20px 6px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .product-card .label {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: var(--accent, var(--pink-strong));
    font-weight: 700;
    margin: 14px 0 4px;
  }
  .product-card .label:first-child { margin-top: 0; }
  .product-card h3 {
    font-size: 1.05rem;
    margin: 0 0 4px;
    font-weight: 700;
  }
  .product-card p { font-size: 0.88rem; color: var(--ink-soft); margin: 0; }

  .product-photo {
    margin-top: 16px;
    aspect-ratio: 1 / 1;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: var(--paper-raised);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .product-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .cta-stack { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }

  .counseling-note {
    margin-top: 28px;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .counseling-note p {
    margin: 0;
    font-size: 0.85rem;
    color: var(--ink-soft);
    line-height: 1.75;
  }

  .share-card {
    margin-top: 28px;
    background: var(--paper-raised);
    border: 1px dashed var(--line);
    border-radius: 18px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .share-card p {
    font-size: 0.88rem;
    margin: 0 0 14px;
    white-space: pre-wrap;
  }
  .share-row { display: flex; gap: 10px; }
  .share-row .btn { flex: 1; }

  .restart-row { text-align: center; margin-top: 24px; }

  .disclaimer {
    font-size: 0.7rem;
    line-height: 1.6;
    color: var(--ink-soft);
    opacity: 0.75;
    text-align: center;
    margin-top: 18px;
  }
  .intro .disclaimer { font-size: 0.62rem; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  [hidden] { display: none !important; }

  /* ---- Share sheet ---- */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(74, 63, 63, 0.42);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 20;
  }
  .sheet {
    width: 100%;
    max-width: 460px;
    background: var(--paper-raised);
    border-radius: 24px 24px 0 0;
    padding: 22px 22px calc(22px + env(safe-area-inset-bottom, 0px));
    box-shadow: 0 -16px 34px -16px rgba(74, 63, 63, 0.3);
  }
  .sheet h3 {
    font-size: 1rem;
    font-weight: 700;
    margin: 0 0 16px;
    text-align: center;
  }
  .sheet-options { display: flex; flex-direction: column; gap: 10px; }
  .sheet-option {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    font-family: inherit;
    font-size: 0.92rem;
    font-weight: 600;
    text-align: left;
    border-radius: 14px;
    padding: 14px 16px;
    min-height: 52px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    text-decoration: none;
  }
  .sheet-option:active { transform: scale(0.99); }
  .sheet-option .ico { font-size: 1.1rem; }
  .sheet-hint {
    font-size: 0.72rem;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 12px;
  }
  .sheet-cancel {
    margin-top: 14px;
    width: 100%;
  }
</style>

<div class="app">
  <div class="topbar">
    <div class="brand">Dione<span>自由が丘</span></div>
    <div class="qcount" id="qcount"></div>
  </div>
  <main class="stage" id="stage"></main>
</div>
<div id="sheetRoot"></div>

      shareHook: "摩擦ゼロの泡洗顔で肌を労わります🕊"
    },
    hedgehog: {
      name: "ぽつぽつザラザラいちごハリネズミちゃん肌",
      tagline: "毛穴・詰まり・ザラつきタイプ",
      pet: "ハリネズミちゃん",
      accent: "var(--t-hedgehog)",
      wash: "var(--t-hedgehog-soft)",
      oneliner: "皮脂と角質が渋滞中！毛穴すっきりケアが効くタイプ。",
      state: "こってりした食事の習慣や、日中の汗・皮脂の分泌により、古い角質と過剰な皮脂が混ざり合って毛穴を詰まらせています。これが黒ずみやザラつき、ファンデーションの毛穴落ちの原因になっています。",
      advice: "毛穴が気になるからといって、ゴシゴシ擦るクレンジングや毛穴パックは逆効果。お肌を傷つけずに「汚れだけを優しく吸着して取り除くこと」が必要です。",
      product: "ラメラモード クレイゲルウォッシュ＆パック",
      reason: "合成界面活性剤を一切使わず、天然クレイ（泥）の吸着力だけで毛穴の奥の汚れや古い角質を包み込んで落とす、泡立たない洗顔・パックです。お肌に必要なうるおいは残したまま、触りたくなるつるんとした素肌へ導きます。",
      shareHook: "天然クレイで毛穴すっきりケア始めます✨"
    },
    cat: {
      name: "どんより夜更かしねこちゃん肌",
      tagline: "くすみ・お疲れ・ハリ不足タイプ",
      pet: "ねこちゃん",
      accent: "var(--t-cat)",
      wash: "var(--t-cat-soft)",
      oneliner: "お疲れ蓄積でどんより気味。土台からのハリ立て直しタイプ。",
      state: "睡眠不足やスマホのブルーライトを長時間浴び続けることで、お肌の代謝（ターンオーバー）が低下気味です。血行不良も重なり、顔全体がどんより暗く見えたり、内側からのハリ不足（年齢サイン）が気になり始めているお疲れ状態です。",
      advice: "ダメージが蓄積して元気（ハリ・ツヤ）を失ったお肌には、部分的なケアではなく、お肌の構造そのものを土台から立て直すアプローチが最大の近道となります。",
      product: "プレケアエッセンス イスク",
      reason: "フリーズドライ（凍結乾燥）させたフェース生コラーゲンを、使用直前に美容液で溶かして使う、鮮度抜群の集中美容液です。塗った瞬間にお肌の角層を整え、内側から押し返すようなパンッとしたハリ・弾力と透明感を与えます。お疲れ肌を一気に格上げしたいなら、まずこの投資が最もおすすめです。",
      shareHook: "生コラーゲン美容液で土台ケア始めます🐾"
    }
  };

  const QUESTIONS = [
    {
      cat: "お肌の環境リスク診断",
      text: "日中、一番長く過ごす場所はどこ？",
      choices: [
        { key: "A", text: "エアコンの効いたオフィスや室内", sub: "PC・スマホ画面と向き合う時間が多い", scores: { camel: 1 } },
        { key: "B", text: "外出が多く、アクティブに動く場所", sub: "日差しや外気に触れる機会が多い", scores: { cat: 1 } },
        { key: "C", text: "自宅や、比較的温度変化の少ない場所", sub: "ついつい肌を触る、または油断しがち", scores: { chick: 1 } }
      ]
    },
    {
      cat: "肌代謝・バリア機能診断",
      text: "最近の「睡眠時間」や「お疲れ度」は？",
      choices: [
        { key: "A", text: "6時間未満、または寝不足気味", sub: "朝から身体が重い…", scores: { cat: 1 } },
        { key: "B", text: "6時間以上キープ！でも…", sub: "ベッドの中での夜更かしスマホが日課", scores: { camel: 1 } },
        { key: "C", text: "睡眠時間はそこそこ", sub: "だけど日々ストレスや寒暖差を感じやすい", scores: { chick: 1 } }
      ]
    },
    {
      cat: "内側からの肌質診断",
      text: "ついつい手が伸びちゃう「大好きな食べ物・飲み物」は？",
      choices: [
        { key: "A", text: "チョコレートやケーキなどの「甘いもの」", sub: "", scores: { hedgehog: 1 } },
        { key: "B", text: "ラーメンや揚げ物などの「こってり・脂っこいもの」", sub: "", scores: { hedgehog: 1 } },
        { key: "C", text: "コーヒーや紅茶が大好き！", sub: "お水はあまり飲まないかも…", scores: { camel: 1 } }
      ]
    },
    {
      cat: "決定的なお悩み",
      text: "今、お肌に触れたときに一番気になるところはどこ？",
      choices: [
        { key: "A", text: "カサカサ・ゴワゴワして、いつもの化粧水が入っていかない", sub: "", scores: { camel: 2 } },
        { key: "B", text: "時々ピリついたり、赤みやポツンとした肌荒れが気になる", sub: "", scores: { chick: 2 } },
        { key: "C", text: "毛穴のザラつき、黒ずみ、ファンデーションの毛穴落ちが気になる", sub: "", scores: { hedgehog: 2 } },
        { key: "D", text: "全体的にどんよりくすみ、ハリがなくなってきた", sub: "", scores: { cat: 2 } }
      ]
    }
  ];

  const state = {
    screen: "intro",
    qIndex: 0,
    scores: { camel: 0, chick: 0, hedgehog: 0, cat: 0 },
    lastQ4Type: null,
    resultType: null
  };

  const stage = document.getElementById("stage");
  const qcount = document.getElementById("qcount");

  function el(html) {
    const t = document.createElement("template");
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }

  function dotsHtml(current) {
    return `<div class="dots">${QUESTIONS.map((_, i) => {
      const cls = i < current ? "done" : i === current ? "current" : "";
      return `<i class="${cls}"></i>`;
    }).join("")}</div>`;
  }

  function pickResultType() {
    let best = null, bestScore = -1;
    for (const k of Object.keys(state.scores)) {
      if (state.scores[k] > bestScore) { bestScore = state.scores[k]; best = k; }
    }
    const ties = Object.keys(state.scores).filter((k) => state.scores[k] === bestScore);
    if (ties.length > 1 && ties.includes(state.lastQ4Type)) return state.lastQ4Type;
    return best;
  }

  function renderIntro() {
    qcount.textContent = "";
    stage.appendChild(el(`
      <div class="intro">
        <div class="eyebrow">SKIN DIAGNOSIS</div>
        <h1 class="font-display">私に合うケアを診断</h1>
        <p>4つの質問に答えるだけ、約30秒。あなたの今のお肌タイプと、サロンが選んだ「運命の1品」をお届けします。</p>
        <div class="quad">
          <div class="thumb"><img src="${IMG.camel}" alt="らくだちゃんタイプ" loading="lazy"></div>
          <div class="thumb"><img src="${IMG.chick}" alt="ひよこちゃんタイプ" loading="lazy"></div>
          <div class="thumb"><img src="${IMG.hedgehog}" alt="ハリネズミちゃんタイプ" loading="lazy"></div>
          <div class="thumb"><img src="${IMG.cat}" alt="ねこちゃんタイプ" loading="lazy"></div>
        </div>
        <button class="btn btn-primary" id="start">診断をはじめる</button>
        <p class="disclaimer">※本診断は簡易チェックです。結果やおすすめ商品は目安であり、効果を保証するものではありません。</p>
      </div>
    `));
    document.getElementById("start").addEventListener("click", () => {
      state.screen = "question";
      state.qIndex = 0;
      render();
    });
  }

  function renderQuestion() {
    const q = QUESTIONS[state.qIndex];
    qcount.textContent = `Q${state.qIndex + 1} / ${QUESTIONS.length}`;
    const wrap = el(`<div></div>`);
    wrap.innerHTML = dotsHtml(state.qIndex);
    const qhead = el(`
      <div class="qhead">
        <div class="cat">${q.cat}</div>
        <h2 class="font-display">${q.text}</h2>
      </div>
    `);
    wrap.appendChild(qhead);
    const choices = el(`<div class="choices"></div>`);
    q.choices.forEach((c) => {
      const btn = el(`
        <button class="choice" type="button">
          <span class="key">${c.key}</span>
          <span class="body">
            <strong>${c.text}</strong>
            ${c.sub ? `<em>${c.sub}</em>` : ""}
          </span>
        </button>
      `);
      btn.addEventListener("click", () => {
        for (const k in c.scores) state.scores[k] += c.scores[k];
        if (state.qIndex === QUESTIONS.length - 1) state.lastQ4Type = Object.keys(c.scores)[0];
        if (state.qIndex < QUESTIONS.length - 1) {
          state.qIndex += 1;
          render();
        } else {
          state.resultType = pickResultType();
          state.screen = "result";
          render();
        }
      });
      choices.appendChild(btn);
    });
    wrap.appendChild(choices);

    if (state.qIndex > 0) {
      const nav = el(`<div class="stepnav"><button class="btn btn-ghost" id="back">← 前の質問に戻る</button></div>`);
      wrap.appendChild(nav);
    }
    stage.appendChild(wrap);
    if (state.qIndex > 0) {
      document.getElementById("back").addEventListener("click", () => {
        const prevQ = QUESTIONS[state.qIndex - 1];
        state.qIndex -= 1;
        render();
      });
    }
  }

  function renderResult() {
    qcount.textContent = "診断結果";
    const t = TYPES[state.resultType];
    const shareText = `私は『${t.name.replace("ちゃん肌", "")}』タイプでした！${t.shareHook} #Dione肌診断 #Dione自由が丘`;
    const box = el(`
      <div>
        <div class="result-wash" style="--wash:${t.wash}; --accent:${t.accent}">
          <div class="hero-img" style="--accent:${t.accent}"><img src="${IMG[state.resultType]}" alt="${t.name}"></div>
          <div class="type-eyebrow" style="--accent:${t.accent}">RESULT</div>
          <h2 class="type-name font-display">${t.name}</h2>
          <div class="type-tagline">${t.tagline}</div>
        </div>

        <div class="oneliner">${t.oneliner}</div>

        <div class="section-label">お肌の状態</div>
        <p class="prose">${t.state}</p>

        <div class="section-label">${t.pet}からのアドバイス</div>
        <p class="prose">${t.advice}</p>

        <div class="section-label highlight">運命の1品</div>
        <div class="product-card" style="--accent:${t.accent}">
          <h3 class="font-display">『${t.product}』</h3>
          <div class="label">選定理由</div>
          <p>${t.reason}</p>
          <div class="product-photo"><img src="${IMG_PRODUCT[state.resultType]}" alt="${t.product}"></div>
        </div>

        <div class="counseling-note">
          <p>ラメラモードはカウンセリング商品です。スキンケアのプロがお肌の状態や質を見てカウンセリングした上で、お客さまに合ったものをおすすめして販売しております。既に一度、店舗でECサイトの会員登録済の方はいつでもオンラインで購入可能です。</p>
        </div>

        <div class="cta-stack">
          <a class="btn btn-beige" href="https://shop-faith.jp/shop/default.aspx" target="_blank" rel="noopener noreferrer">既に会員登録済みの方はこちら</a>
          <button class="btn btn-secondary" id="ctaShare">結果をシェアする</button>
        </div>

        <div class="share-card">
          <p id="shareText">${shareText}</p>
          <div class="share-row">
            <button class="btn btn-secondary" id="copyShare">文章をコピー</button>
          </div>
        </div>

        <div class="restart-row">
          <button class="btn btn-ghost" id="restartBottom">もう一度診断する</button>
        </div>

        <p class="disclaimer">ご紹介している商品は、診断結果に合わせたケアの一例です。<br>お肌の状態や感じ方には個人差がありますので、気になることがあればスキンケアのプロにご相談ください。</p>
      </div>
    `);
    stage.appendChild(box);

    document.getElementById("ctaShare").addEventListener("click", () => openShareSheet(shareText, state.resultType));
    document.getElementById("copyShare").addEventListener("click", (e) => copyText(shareText, e.currentTarget));
    document.getElementById("restartBottom").addEventListener("click", restart);
  }

  function openShareSheet(text, typeKey) {
    const root = document.getElementById("sheetRoot");
    root.innerHTML = `
      <div class="sheet-backdrop" id="shareBackdrop">
        <div class="sheet">
          <h3>シェア先を選んでください</h3>
          <div class="sheet-options">
            <button class="sheet-option" id="shareX" type="button"><span class="ico">𝕏</span>Xでシェアする</button>
            <button class="sheet-option" id="shareInstagram" type="button"><span class="ico">📷</span>Instagramでシェアする</button>
            <button class="sheet-option" id="saveImage" type="button"><span class="ico">🖼</span>画像を保存する</button>
          </div>
          <div class="sheet-hint">キャプションをコピーしてから、それぞれのログイン画面を開きます</div>
          <button class="btn btn-ghost sheet-cancel" id="shareCancel" type="button">キャンセル</button>
        </div>
      </div>
    `;
    document.getElementById("shareBackdrop").addEventListener("click", (e) => {
      if (e.target.id === "shareBackdrop") closeShareSheet();
    });
    document.getElementById("shareCancel").addEventListener("click", closeShareSheet);
    document.getElementById("shareX").addEventListener("click", async () => {
      try { await navigator.clipboard.writeText(text); } catch (err) { /* clipboard unavailable */ }
      window.open("https://x.com/login", "_blank", "noopener,noreferrer");
      closeShareSheet();
    });
    document.getElementById("shareInstagram").addEventListener("click", async () => {
      try { await navigator.clipboard.writeText(text); } catch (err) { /* clipboard unavailable */ }
      window.open("https://www.instagram.com/accounts/login/", "_blank", "noopener,noreferrer");
      closeShareSheet();
    });
    document.getElementById("saveImage").addEventListener("click", () => {
      const a = document.createElement("a");
      a.href = IMG[typeKey];
      a.download = `dione-shindan-${typeKey}.jpg`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      closeShareSheet();
    });
  }

  function closeShareSheet() {
    document.getElementById("sheetRoot").innerHTML = "";
  }

  async function copyText(text, btn) {
    try {
      await navigator.clipboard.writeText(text);
      flashCopied(btn);
    } catch (err) {
      flashCopied(btn, "コピーできませんでした");
    }
  }

  function flashCopied(btn, msg) {
    const original = btn.textContent;
    btn.textContent = msg || "コピーしました";
    setTimeout(() => { btn.textContent = original; }, 1400);
  }

  function restart() {
    state.screen = "intro";
    state.qIndex = 0;
    state.scores = { camel: 0, chick: 0, hedgehog: 0, cat: 0 };
    state.lastQ4Type = null;
    state.resultType = null;
    render();
  }

  function render() {
    stage.innerHTML = "";
    if (state.screen === "intro") renderIntro();
    else if (state.screen === "question") renderQuestion();
    else if (state.screen === "result") renderResult();
  }

  render();
</script>
